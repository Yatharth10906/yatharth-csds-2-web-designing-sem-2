<!DOCTYPE html>
<html lang="en">
    <body>
    <h1> JAVA SCRIPT VARIABLES</h1>
    <script>
        // Variable declaration
        var name = "John Doe";
        let age = 30;
        const PI = 3.14;
        let c=0;
        var d=undefined;

        // Output variables
        console.log("Name:", name);
        console.log("Age:", age);
        console.log("PI:", PI);
        console.log("c:", c);
        console.log("d:", d);
        console.log(typeof name);
        {
            let d = 20; // Block-scoped variable
            console.log(d);

        }


        // Variable reassignment
        name = "Jane Smith";
        age = 25;

        console.log("Updated Name:", name);
        console.log("Updated Age:", age);
    </script>
</body>


</html>
