<html>
    <body>
        <script>
        function cal(op)
        {
            var a = 5;
            var b = 51;
            if (op == "add")
            {
                console.log("sum ="+ (a+b));
            }
            else if (op == "sub")
            {
                console.log("difference ="+ (a-b));
            }
            else if (op == "mul")
            {
                console.log("product ="+ (a*b));
            }
            else if (op == "div")
            {
                console.log("quotient ="+ (a/b));
            }
            else
            {
                console.log("invalid operator");
            }
        }

        </script>

    </body>
</html>
