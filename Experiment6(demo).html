<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6: DOM Manipulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        #description {
            color: #555;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        /* shows a small hint below input when user types */
        #livePreview {
            font-size: 0.85rem;
            color: #764ba2;
            min-height: 18px;
            margin-bottom: 5px;
        }

        .input-group {
            margin: 25px 0 20px 0;
        }

        input {
            padding: 12px 20px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
        }

        input:focus {
            border-color: #764ba2;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #764ba2;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5a368a;
        }

        .reset-btn {
            grid-column: span 2;
            background: #ff4757;
        }

        .reset-btn:hover {
            background: #cc2f3e;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 id="mainHead">Welcome to Web Fun Lab</h2>
        <p id="description">Explore the power of DOM manipulation!</p>

        <div class="input-group">
            <input type="text" id="userInput" placeholder="Type something here..." onchange="handleChange()" />
            <p id="livePreview"></p>
        </div>

        <div class="button-grid">
            <!-- onclick used directly on buttons as required by problem statement -->
            <button onclick="changeHeading()">Change Heading</button>
            <button onclick="changeBgColor()">Random Color</button>
            <button onclick="increaseFontSize()">Increase Font</button>
            <button onclick="toggleParagraph()">Show / Hide Text</button>
            <button class="reset-btn" onclick="resetPage()">Reset Page</button>
        </div>

    </div>

    <script src="Experiment6(demo).js"></script>

</body>

</html>
